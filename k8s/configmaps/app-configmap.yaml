apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudcart-config
  namespace: cloudcart
data:
  # Database connection info (non-sensitive)
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_NAME: "cloudcart"
  
  # Service ports
  USER_SERVICE_PORT: "3001"
  PRODUCT_SERVICE_PORT: "3002"
  CART_SERVICE_PORT: "3003"
  ORDER_SERVICE_PORT: "3004"
  
  # Application config
  NODE_ENV: "production"
  
  # Frontend URL (for CORS)
  FRONTEND_URL: "http://cloudcart.local"