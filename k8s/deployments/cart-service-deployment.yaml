apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: cloudcart
  labels:
    app: cart-service
    version: "1.0"
  annotations:
    # Track deployment metadata
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  
  # Selector: which Pods does this Deployment manage?
  selector:
    matchLabels:
      app: cart-service
  
  # Rolling Update Strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # At most 1 Pod can be unavailable during an update
      maxUnavailable: 1
      # At most 1 extra Pod can exist during an update
      maxSurge: 1
      # With 2 replicas: old pod is removed, new pod is added one at a time
      # = Zero downtime updates
  
  template:
    metadata:
      labels:
        tier: backend
        app: cart-service
        version: "1.0"
    spec:
      serviceAccountName: cloudcart-app
      # Security context at Pod level
      # Prevents privilege escalation for all containers in this Pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Graceful shutdown: wait 30s before killing the container
      # Gives the app time to finish in-flight requests
      terminationGracePeriodSeconds: 30
      
      containers:
        - name: cart-service
          image: 139023233927.dkr.ecr.us-east-1.amazonaws.com/cloudcart/cart-service:v1
          imagePullPolicy: Always   # Use local Minikube image
          
          ports:
            - containerPort: 3003
              name: http
          
          # Environment variables from ConfigMap and Secret
          env:
            - name: PORT
              value: "3003"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cloudcart-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: cloudcart-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: cloudcart-config
                  key: DB_NAME
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: cloudcart-config
                  key: NODE_ENV
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: cloudcart-config
                  key: FRONTEND_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cloudcart-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudcart-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloudcart-secrets
                  key: JWT_SECRET
          
          # Resource management
          resources:
            requests:
              # Kubernetes MUST have this much available on a node to schedule this Pod
              cpu: "100m"      # 0.1 CPU core
              memory: "128Mi"  # 128 MiB
            limits:
              # Pod is throttled (CPU) or killed (memory) if it exceeds these
              cpu: "500m"      # 0.5 CPU core
              memory: "512Mi"  # 512 MiB
          
          # Startup Probe: checks app has started before other probes begin
          startupProbe:
            httpGet:
              path: /health
              port: 3003
            # failureThreshold * periodSeconds = max startup time
            failureThreshold: 30
            periodSeconds: 2       # Check every 2 seconds
            # Total allowed startup time: 30 * 2 = 60 seconds
          
          # Readiness Probe: removes Pod from Service if DB connection fails
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5   # Wait 5s after startup probe before checking
            periodSeconds: 10        # Check every 10 seconds
            failureThreshold: 3      # Remove from service after 3 consecutive failures
            successThreshold: 1      # Add back after 1 success
            timeoutSeconds: 3        # Fail if no response in 3s
          
          # Liveness Probe: restarts Pod if it becomes deadlocked
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          
          # Security context at container level
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL  # Remove all Linux capabilities
          
          # Temporary filesystem for Node.js (needed for readOnlyRootFilesystem)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      volumes:
        - name: tmp
          emptyDir: {}