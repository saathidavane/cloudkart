server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router: serve index.html for all non-file routes
    # Without this, refreshing /products returns 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression for faster load times
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Cache static assets aggressively (they have content hashes in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}